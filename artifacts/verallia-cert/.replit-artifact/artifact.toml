kind = "web"
previewPath = "/"
title = "Verallia Certificados"
version = "1.0.0"
id = "artifacts/verallia-cert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19476

[services.development]
run = "pnpm --filter @workspace/verallia-cert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/verallia-cert", "run", "build" ]
publicDir = "artifacts/verallia-cert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19476"
BASE_PATH = "/"
