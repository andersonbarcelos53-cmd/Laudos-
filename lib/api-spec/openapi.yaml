openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Verallia Certificate Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: certificates
    description: Certificate PDF management
  - name: palletQuantities
    description: Pallet quantity base management
  - name: history
    description: Certificate fill history
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /certificates/upload:
    post:
      operationId: uploadCertificates
      tags: [certificates]
      summary: Upload one or more PDF certificate files
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CertificateUploadForm"
      responses:
        "201":
          description: Certificates uploaded and parsed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"
        "400":
          description: Invalid files

  /certificates:
    get:
      operationId: listCertificates
      tags: [certificates]
      summary: List all certificates
      responses:
        "200":
          description: List of certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"

  /certificates/sap-codes:
    get:
      operationId: listSapCodes
      tags: [certificates]
      summary: List all unique SAP codes with their certificate counts
      responses:
        "200":
          description: List of SAP codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SapCodeSummary"

  /certificates/by-sap/{sapCode}:
    get:
      operationId: getCertificatesBySap
      tags: [certificates]
      summary: Get all certificates for a given SAP code
      parameters:
        - name: sapCode
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Certificates for the SAP code
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Certificate"
        "404":
          description: SAP code not found

  /certificates/bulk-delete:
    post:
      operationId: bulkDeleteCertificates
      tags: [certificates]
      summary: Delete multiple certificates by ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteCertificatesInput"
      responses:
        "200":
          description: Deletion result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteCertificates200"
        "400":
          description: Invalid request

  /certificates/{id}:
    delete:
      operationId: deleteCertificate
      tags: [certificates]
      summary: Delete a certificate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /pallet-quantities:
    get:
      operationId: listPalletQuantities
      tags: [palletQuantities]
      summary: List all pallet quantity entries
      responses:
        "200":
          description: List of pallet quantity entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PalletQuantity"

  /pallet-quantities/import:
    post:
      operationId: importPalletQuantities
      tags: [palletQuantities]
      summary: Import pallet quantities from Excel file (replaces all existing)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PalletImportForm"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Invalid file

  /pallet-quantities/add:
    post:
      operationId: addPalletQuantity
      tags: [palletQuantities]
      summary: Add a single pallet quantity entry manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PalletQuantityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalletQuantity"
        "400":
          description: Invalid input or duplicate SAP code

  /pallet-quantities/{id}:
    get:
      operationId: getPalletQuantity
      tags: [palletQuantities]
      summary: Get pallet quantity for a specific ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pallet quantity entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalletQuantity"
        "404":
          description: Not found
    patch:
      operationId: updatePalletQuantity
      tags: [palletQuantities]
      summary: Update a pallet quantity entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PalletQuantityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PalletQuantity"
        "404":
          description: Not found
    delete:
      operationId: deletePalletQuantity
      tags: [palletQuantities]
      summary: Delete a pallet quantity entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List all generated certificate history
      responses:
        "200":
          description: List of history records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryRecord"
    post:
      operationId: fillCertificate
      tags: [history]
      summary: Fill a certificate with invoice/pallet/pieces data and generate PDF
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertificateFillInput"
      responses:
        "201":
          description: Certificate filled and history record created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryRecord"
        "400":
          description: Missing required fields or SAP code not found in pallet base
        "404":
          description: Certificate not found

  /history/{id}:
    delete:
      operationId: deleteHistoryRecord
      tags: [history]
      summary: Delete a history record and its generated PDF file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found

  /history/bulk-delete:
    post:
      operationId: bulkDeleteHistory
      tags: [history]
      summary: Delete multiple history records by IDs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkDeleteHistoryInput"
      responses:
        "200":
          description: Deleted count
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

  /history/{id}/download:
    get:
      operationId: downloadGeneratedPdf
      tags: [history]
      summary: Download the generated PDF for a history record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    BulkDeleteCertificatesInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer

    BulkDeleteCertificates200:
      type: object
      required: [deleted]
      properties:
        deleted:
          type: integer

    BulkDeleteHistoryInput:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Certificate:
      type: object
      required: [id, sapCode, productionDate, fileName, uploadedAt]
      properties:
        id:
          type: integer
        sapCode:
          type: string
        productionDate:
          type: string
        productName:
          type: ["string", "null"]
        fileName:
          type: string
        uploadedAt:
          type: string

    CertificateUploadForm:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string
            format: binary

    SapCodeSummary:
      type: object
      required: [sapCode, certificateCount, dates]
      properties:
        sapCode:
          type: string
        productName:
          type: ["string", "null"]
        certificateCount:
          type: integer
        dates:
          type: array
          items:
            type: string

    PalletQuantity:
      type: object
      required: [id, sapCode, piecesPerPallet]
      properties:
        id:
          type: integer
        sapCode:
          type: string
        productName:
          type: ["string", "null"]
        piecesPerPallet:
          type: integer
        updatedAt:
          type: string

    PalletImportForm:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary

    ImportResult:
      type: object
      required: [imported, total]
      properties:
        imported:
          type: integer
        total:
          type: integer
        message:
          type: string

    PalletQuantityInput:
      type: object
      required: [sapCode, piecesPerPallet]
      properties:
        sapCode:
          type: string
        productName:
          type: string
        piecesPerPallet:
          type: integer

    PalletQuantityUpdate:
      type: object
      properties:
        sapCode:
          type: string
        productName:
          type: string
        piecesPerPallet:
          type: integer

    CertificateFillInput:
      type: object
      required: [certificateId, invoiceNumber, pallets, pieces]
      properties:
        certificateId:
          type: integer
        invoiceNumber:
          type: string
        pallets:
          type: integer
        pieces:
          type: integer

    HistoryRecord:
      type: object
      required: [id, sapCode, productionDate, invoiceNumber, pallets, pieces, generatedAt, userName, downloadUrl]
      properties:
        id:
          type: integer
        sapCode:
          type: string
        productName:
          type: ["string", "null"]
        productionDate:
          type: string
        invoiceNumber:
          type: string
        pallets:
          type: integer
        pieces:
          type: integer
        generatedAt:
          type: string
        userName:
          type: string
        downloadUrl:
          type: string

    Stats:
      type: object
      required: [totalCertificates, totalSapCodes, totalHistoryRecords, totalPalletEntries]
      properties:
        totalCertificates:
          type: integer
        totalSapCodes:
          type: integer
        totalHistoryRecords:
          type: integer
        totalPalletEntries:
          type: integer
        recentHistory:
          type: array
          items:
            $ref: "#/components/schemas/HistoryRecord"
